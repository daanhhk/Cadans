packages:
  - "packages/*"
  - "apps/*"
  - "workers/*"

# esbuild needs its postinstall (links the platform binary) for `vite build`.
# workerd needs its postinstall (downloads the runtime binary) for the Worker
# integration tests (@cloudflare/vitest-pool-workers). sharp stays off (unused).
allowBuilds:
  esbuild: true
  sharp: false
  workerd: true
